version: '3.8'

services:
  # Backend - FastAPI/Python
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: edwlearn/momentum-fitness:backend-latest
    container_name: momentum-backend
    ports:
      - "8000:8000"
    volumes:
      # Persistencia de la base de datos (el volumen se monta en un directorio)
      - db_data:/app/data
      # Persistencia de logs
      - logs_data:/app/logs
      # Para desarrollo: sincronizar código en tiempo real (comentar en producción)
      # - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/gimnasio.db
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - Next.js Static
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: edwlearn/momentum-fitness:frontend-latest
    container_name: momentum-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    # Healthcheck deshabilitado - nginx es muy estable y el servicio funciona correctamente
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 20s

# Volumes para persistencia de datos
volumes:
  db_data:
    driver: local
    name: momentum_database
  logs_data:
    driver: local
    name: momentum_logs

networks:
  default:
    name: momentum_network
